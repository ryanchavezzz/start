<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Style Preview</title>
<style>
@font-face {
  font-family: "MonoLisa";
  src: url("fonts/MonoLisa-normal.woff2") format("woff2");
  font-weight: 400;
  font-style: normal;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "MonoLisa", system-ui, sans-serif;
  background: #f0f0f0;
  color: #171717;
  padding: 48px 32px;
  display: flex;
  flex-direction: column;
  gap: 64px;
}

/* ── layout ── */
.style-block {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.style-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #999;
  padding-bottom: 8px;
  border-bottom: 1px solid #ddd;
}
.page-mock {
  background: #fafafa;
  border: 1px solid #e4e4e4;
  border-radius: 12px;
  padding: 28px 32px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ── panel ── */
.panel-heading {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #aaa;
  margin-bottom: 8px;
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

/* ── icon placeholder ── */
.ico {
  width: 14px;
  height: 14px;
  border-radius: 2px;
  background: currentColor;
  opacity: 0.45;
  flex-shrink: 0;
}

/* ════════════════════════════════════════
   STYLE 1 — Default (current)
   ════════════════════════════════════════ */
.s1 .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; height: 32px;
  background: #fff; border: 1px solid #e4e4e4; border-radius: 6px;
  color: #171717; font-size: 14px; font-weight: 500; font-family: inherit;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06);
  white-space: nowrap; text-decoration: none; cursor: default;
  transition: background .12s, border-color .12s;
}
.s1 .btn:hover { background: #f5f5f5; border-color: #b0b0b0; }

/* ════════════════════════════════════════
   STYLE 2 — Pill
   ════════════════════════════════════════ */
.s2 .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; height: 32px;
  background: #fff; border: 1px solid #e4e4e4; border-radius: 9999px;
  color: #171717; font-size: 14px; font-weight: 500; font-family: inherit;
  box-shadow: 0 1px 2px rgba(0,0,0,.05);
  white-space: nowrap; text-decoration: none; cursor: default;
  transition: background .12s, border-color .12s;
}
.s2 .btn:hover { background: #f5f5f5; border-color: #b0b0b0; }

/* ════════════════════════════════════════
   STYLE 3 — Ghost / flat
   ════════════════════════════════════════ */
.s3 .page-mock { background: #fafafa; }
.s3 .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 10px; height: 32px;
  background: transparent; border: none; border-radius: 6px;
  color: #4d4d4d; font-size: 14px; font-weight: 500; font-family: inherit;
  white-space: nowrap; text-decoration: none; cursor: default;
  transition: background .12s, color .12s;
}
.s3 .btn:hover { background: #e8e8e8; color: #171717; }

/* ════════════════════════════════════════
   STYLE 4 — Solid dark
   ════════════════════════════════════════ */
.s4 .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; height: 32px;
  background: #171717; border: 1px solid #171717; border-radius: 6px;
  color: #fff; font-size: 14px; font-weight: 500; font-family: inherit;
  white-space: nowrap; text-decoration: none; cursor: default;
  transition: background .12s, border-color .12s;
}
.s4 .btn:hover { background: #333; border-color: #333; }

/* ════════════════════════════════════════
   STYLE 5 — Tinted soft (blue)
   ════════════════════════════════════════ */
.s5 .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; height: 32px;
  background: #eef2ff; border: 1px solid #c7d4ff; border-radius: 6px;
  color: #2a4db5; font-size: 14px; font-weight: 500; font-family: inherit;
  white-space: nowrap; text-decoration: none; cursor: default;
  transition: background .12s, border-color .12s;
}
.s5 .btn:hover { background: #dce5ff; border-color: #9cb0ff; }

/* ════════════════════════════════════════
   STYLE 6 — Underline only
   ════════════════════════════════════════ */
.s6 .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 2px; height: 32px;
  background: transparent; border: none;
  border-bottom: 1px solid #ccc; border-radius: 0;
  color: #171717; font-size: 14px; font-weight: 500; font-family: inherit;
  white-space: nowrap; text-decoration: none; cursor: default;
  transition: border-color .12s, color .12s;
}
.s6 .chips { gap: 16px; }
.s6 .btn:hover { border-color: #171717; }

/* ════════════════════════════════════════
   STYLE 7 — Outlined accent (fills on hover)
   ════════════════════════════════════════ */
.s7 .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; height: 32px;
  background: transparent; border: 1.5px solid #4a6fa5; border-radius: 6px;
  color: #4a6fa5; font-size: 14px; font-weight: 500; font-family: inherit;
  white-space: nowrap; text-decoration: none; cursor: default;
  transition: background .12s, color .12s;
}
.s7 .btn:hover { background: #4a6fa5; color: #fff; }

/* ════════════════════════════════════════
   STYLE 8 — Card / elevated
   ════════════════════════════════════════ */
.s8 .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px; height: 36px;
  background: #fff; border: 1px solid #e4e4e4; border-radius: 10px;
  color: #171717; font-size: 14px; font-weight: 500; font-family: inherit;
  box-shadow: 0 2px 6px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  white-space: nowrap; text-decoration: none; cursor: default;
  transition: box-shadow .15s, transform .15s;
}
.s8 .btn:hover { box-shadow: 0 4px 14px rgba(0,0,0,.13), 0 1px 3px rgba(0,0,0,.06); transform: translateY(-1px); }

/* ════════════════════════════════════════
   STYLE 9 — Minimal text
   ════════════════════════════════════════ */
.s9 .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 4px; height: 32px;
  background: transparent; border: none; border-radius: 4px;
  color: #888; font-size: 14px; font-weight: 400; font-family: inherit;
  white-space: nowrap; text-decoration: none; cursor: default;
  transition: color .12s;
}
.s9 .chips { gap: 12px; }
.s9 .btn:hover { color: #171717; }

/* ════════════════════════════════════════
   STYLE 10 — Brutalist
   ════════════════════════════════════════ */
.s10 .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 11px; height: 32px;
  background: #fff; border: 2px solid #171717; border-radius: 3px;
  color: #171717; font-size: 14px; font-weight: 600; font-family: inherit;
  box-shadow: 3px 3px 0 #171717;
  white-space: nowrap; text-decoration: none; cursor: default;
  transition: box-shadow .1s, transform .1s;
}
.s10 .chips { gap: 8px; padding-bottom: 4px; }
.s10 .btn:hover { box-shadow: 1px 1px 0 #171717; transform: translate(2px, 2px); }
</style>
</head>
<body>

<!-- panels reused for each style -->
<script>
const panels = [
  { heading: "Links", links: ["Google Drive","iCloud","YouTube","HN","Claude","ChatGPT","Gemini","Gmail","Notion"] },
  { heading: "Dev", links: ["GitHub","Vercel","Linear","Figma","Supabase","Railway","Cloudflare"] },
  { heading: "Whatbox", links: ["Whatbox","ruTorrent","Flood","Jackett","Plex","Stash","TMM"] },
];

const styles = [
  "1 — Default (current)",
  "2 — Pill",
  "3 — Ghost / flat",
  "4 — Solid dark",
  "5 — Tinted soft",
  "6 — Underline only",
  "7 — Outlined accent",
  "8 — Card / elevated",
  "9 — Minimal text",
  "10 — Brutalist",
];

styles.forEach((label, i) => {
  const n = i + 1;
  const block = document.createElement("div");
  block.className = `style-block s${n}`;

  const lbl = document.createElement("div");
  lbl.className = "style-label";
  lbl.textContent = label;
  block.appendChild(lbl);

  const mock = document.createElement("div");
  mock.className = "page-mock";

  panels.forEach(p => {
    const panel = document.createElement("div");

    const h = document.createElement("div");
    h.className = "panel-heading";
    h.textContent = p.heading;
    panel.appendChild(h);

    const chips = document.createElement("div");
    chips.className = "chips";

    p.links.forEach(name => {
      const a = document.createElement("a");
      a.className = "btn";
      a.href = "#";
      a.innerHTML = `<span class="ico"></span>${name}`;
      chips.appendChild(a);
    });

    panel.appendChild(chips);
    mock.appendChild(panel);
  });

  block.appendChild(mock);
  document.body.appendChild(block);
});
</script>
</body>
</html>
